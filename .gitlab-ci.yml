# add development and test environment when push to a branch test start
stages:
  - build
  - upload_to_sentry

variables:
  ANDROID_WORKING_DIR: android
  SENTRY_AUTH_TOKEN: $SENTRY_AUTH_TOKEN
  SENTRY_ORG: $SENTRY_ORG
  SENTRY_PROJECT: $SENTRY_PROJECT

build_android_release:
  stage: build
  image: openjdk:17-jdk
  script:
    - cd "$ANDROID_WORKING_DIR" || exit 1
    - echo "Building APK..."
    - ./gradlew assembleRelease
  artifacts:
    paths:
      - "$ANDROID_WORKING_DIR/app/build/outputs/apk/release/*.apk"

upload_to_sentry:
  stage: upload_to_sentry
  image: alpine:3.19
  needs:
    - build_android_release
  script:
    - apk add --no-cache curl bash
    - curl -sL https://sentry.io/get-cli/ | bash
    - export SENTRY_ORG=$SENTRY_ORG
    - export SENTRY_PROJECT=SENTRY_PROJECT
    - export SENTRY_AUTH_TOKEN=SENTRY_AUTH_TOKEN
    - sentry-cli build android/app/build/outputs/apk/release/app-release.apk \
      --org "$SENTRY_ORG" \
      --project "$SENTRY_PROJECT" \
      --build-configuration Release
